<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Matching Game | Trò chơi Ghép Đôi Thẻ</title>
    <meta name="description" content="Một trò chơi ghép đôi thẻ nhớ cổ điển với hiệu ứng lật 3D hiện đại và thiết kế đáp ứng.">
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Google Fonts for modern typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Ghép Đôi Thẻ</h1>
            <div class="controls">
                <div class="difficulty">
                    <label for="card-selector">Số thẻ:</label>
                    <select id="card-selector">
                        <option value="8">8 Thẻ (4 Cặp)</option>
                        <option value="12">12 Thẻ (6 Cặp)</option>
                        <option value="16">16 Thẻ (8 Cặp)</option>
                    </select>
                </div>
                <div class="stats">
                    <span id="moves-label">Lượt: <strong id="moves">0</strong></span>
                </div>
            </div>
        </header>

        <main aria-label="Khu vực trò chơi">
            <div id="game-grid" class="game-grid">
                <!-- Thẻ sẽ được tạo động bằng JavaScript -->
            </div>
        </main>

        <footer>
            <button id="reset-btn" class="btn-primary">Chơi Lại</button>
        </footer>
    </div>

    <!-- Win Modal -->
    <div id="win-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Chúc mừng! 🎉</h2>
            <p>Bạn đã hoàn thành trò chơi trong <span id="final-moves">0</span> lượt.</p>
            <button id="play-again-btn" class="btn-primary">Chơi Tiếp</button>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
